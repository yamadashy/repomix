name: Performance Benchmark

on:
  pull_request:
    branches: [main]

concurrency:
  group: perf-benchmark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  post-pending:
    name: Post Pending Comment
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    permissions:
      pull-requests: write
    steps:
      - name: Post or update pending comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          COMMENT_MARKER="<!-- repomix-perf-benchmark -->"
          BODY="${COMMENT_MARKER}
          ## ⚡ Performance Benchmark

          <table><tr><td><strong>Latest commit:</strong></td><td><code>${SHORT_SHA}</code></td></tr>
          <tr><td><strong>Status:</strong></td><td>⚡ Benchmark in progress...</td></tr></table>

          [Workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"

          # Find existing comment by marker
          COMMENT_ID=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | startswith(\"${COMMENT_MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi

  benchmark:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runs: 10
          - os: macos-latest
            runs: 20
          - os: windows-latest
            runs: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pr-branch
          persist-credentials: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: main-branch
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: pr-branch/.tool-versions
          cache: npm
          cache-dependency-path: |
            pr-branch/package-lock.json
            main-branch/package-lock.json

      - name: Install hyperfine
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)  sudo apt-get update && sudo apt-get install -y hyperfine ;;
            macOS)  brew install hyperfine ;;
            Windows)
              curl -fsSL -o hyperfine.zip "https://github.com/sharkdp/hyperfine/releases/download/v1.19.0/hyperfine-v1.19.0-x86_64-pc-windows-msvc.zip"
              unzip -q hyperfine.zip && mv hyperfine-v1.19.0-x86_64-pc-windows-msvc/hyperfine.exe /usr/bin/
              ;;
          esac

      - name: Install and build (PR branch)
        working-directory: pr-branch
        run: npm ci && npm run build

      - name: Install and build (main branch)
        working-directory: main-branch
        run: npm ci && npm run build

      - name: Run benchmark
        shell: bash
        env:
          BENCH_RUNS: ${{ matrix.runs }}
        run: |
          OUTPUT_FILE=$(mktemp)

          # Benchmark PR branch
          hyperfine \
            --warmup 2 \
            --runs "$BENCH_RUNS" \
            --export-json "$RUNNER_TEMP/pr-bench.json" \
            "node pr-branch/bin/repomix.cjs pr-branch --output $OUTPUT_FILE"

          # Benchmark main branch
          hyperfine \
            --warmup 2 \
            --runs "$BENCH_RUNS" \
            --export-json "$RUNNER_TEMP/main-bench.json" \
            "node main-branch/bin/repomix.cjs main-branch --output $OUTPUT_FILE"

          # Convert hyperfine output to our format (mean in ms, stddev for variation)
          node -e "
            const fs = require('fs');
            const pr = JSON.parse(fs.readFileSync('$RUNNER_TEMP/pr-bench.json')).results[0];
            const main = JSON.parse(fs.readFileSync('$RUNNER_TEMP/main-bench.json')).results[0];
            const result = {
              pr: Math.round(pr.mean * 1000),
              prStddev: Math.round(pr.stddev * 1000),
              main: Math.round(main.mean * 1000),
              mainStddev: Math.round(main.stddev * 1000)
            };
            fs.writeFileSync('$RUNNER_TEMP/bench-result.json', JSON.stringify(result));
          "

      - name: Upload benchmark result
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: bench-result-${{ matrix.os }}
          path: ${{ runner.temp }}/bench-result.json
          retention-days: 1

  comment:
    name: Comment Results
    needs: benchmark
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() }}
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: results
          pattern: bench-result-*

      - name: Generate benchmark report
        id: report
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"

          generate_row() {
            local os=$1
            local label=$2
            local file="results/bench-result-${os}/bench-result.json"

            if [ ! -f "$file" ]; then
              echo "<tr><td><strong>${label}:</strong></td><td>-</td></tr>"
              return
            fi

            local data
            data=$(node -e "console.log(JSON.stringify(JSON.parse(require('fs').readFileSync('$file','utf8'))))")

            local pr_ms main_ms pr_stddev main_stddev
            pr_ms=$(node -e "console.log(JSON.parse('$data').pr)")
            main_ms=$(node -e "console.log(JSON.parse('$data').main)")
            pr_stddev=$(node -e "console.log(JSON.parse('$data').prStddev)")
            main_stddev=$(node -e "console.log(JSON.parse('$data').mainStddev)")

            local pr_sec main_sec pr_stddev_sec main_stddev_sec
            pr_sec=$(awk "BEGIN {printf \"%.2f\", $pr_ms / 1000}")
            main_sec=$(awk "BEGIN {printf \"%.2f\", $main_ms / 1000}")
            pr_stddev_sec=$(awk "BEGIN {printf \"%.2f\", $pr_stddev / 1000}")
            main_stddev_sec=$(awk "BEGIN {printf \"%.2f\", $main_stddev / 1000}")

            # Calculate ratio and its uncertainty (hyperfine style)
            local ratio ratio_stddev comparison
            if [ "$pr_ms" -gt 0 ] && [ "$main_ms" -gt 0 ]; then
              ratio=$(awk "BEGIN {printf \"%.2f\", $main_ms / $pr_ms}")
              # Error propagation for ratio: σ_ratio ≈ ratio * sqrt((σ_pr/pr)² + (σ_main/main)²)
              ratio_stddev=$(awk "BEGIN {
                r = $main_ms / $pr_ms;
                rel_err = sqrt(($pr_stddev/$pr_ms)^2 + ($main_stddev/$main_ms)^2);
                printf \"%.2f\", r * rel_err
              }")
              if (( $(awk "BEGIN {print ($ratio >= 1.0)}") )); then
                comparison="**${ratio} ± ${ratio_stddev} times faster**"
              else
                local inv_ratio inv_stddev
                inv_ratio=$(awk "BEGIN {printf \"%.2f\", 1/$ratio}")
                inv_stddev=$(awk "BEGIN {printf \"%.2f\", $ratio_stddev/($ratio^2)}")
                comparison="${inv_ratio} ± ${inv_stddev} times slower"
              fi
            else
              comparison="N/A"
            fi

            echo "<tr><td><strong>${label}:</strong></td><td>${pr_sec}s ± ${pr_stddev_sec}s vs ${main_sec}s ± ${main_stddev_sec}s · ${comparison}</td></tr>"
          }

          BODY="## ⚡ Performance Benchmark

          <table><tr><td><strong>Latest commit:</strong></td><td><code>${SHORT_SHA}</code></td></tr>
          <tr><td><strong>Status:</strong></td><td>✅ Benchmark complete!</td></tr>
          $(generate_row "ubuntu-latest" "Ubuntu")
          $(generate_row "macos-latest" "macOS")
          $(generate_row "windows-latest" "Windows")
          </table>

          <details>
          <summary>Details</summary>

          - Packing the repomix repository with \`node bin/repomix.cjs\`
          - Warmup: 2 runs (discarded)
          - Measurement: 10 runs / 20 on macOS (mean ± σ, via hyperfine)
          - [Workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})

          </details>"

          echo "$BODY" >> "$GITHUB_STEP_SUMMARY"

          # Save report for comment step
          echo "$BODY" > "$RUNNER_TEMP/benchmark-report.md"

      - name: Comment on PR
        if: ${{ github.event.pull_request.head.repo.fork == false }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT_MARKER="<!-- repomix-perf-benchmark -->"
          BODY="${COMMENT_MARKER}
          $(cat "$RUNNER_TEMP/benchmark-report.md")"

          # Find existing comment by marker
          COMMENT_ID=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" --paginate --jq ".[] | select(.body | startswith(\"${COMMENT_MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${GH_REPO}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
