name: CI Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.tool-versions'
      - '.github/workflows/ci-website.yml'
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.tool-versions'
      - '.github/workflows/ci-website.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-website-client:
    name: Lint Website Client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - name: Install website client dependencies
        working-directory: website/client
        run: npm ci
      - name: Lint website client
        working-directory: website/client
        run: node --run lint
      - name: Build website client
        working-directory: website/client
        run: node --run docs:build

  lint-website-server:
    name: Lint Website Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - name: Build and link local repomix
        run: |
          npm ci
          node --run build
          npm link
      - name: Install website server dependencies
        working-directory: website/server
        run: |
          # npm 12 fails to prepare the github:repomix git dependency because its
          # min-release-age config conflicts with the --before it uses internally.
          # Downgrade to npm 11.4.0, which predates the flag (matches Dockerfile).
          npm install -g npm@11.4.0
          npm ci
          npm link repomix
      - name: Lint website server
        working-directory: website/server
        run: node --run lint

  test-website-server:
    name: Test Website Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - name: Build and link local repomix
        run: |
          npm ci
          node --run build
          npm link
      - name: Install website server dependencies
        working-directory: website/server
        run: |
          # npm 12 fails to prepare the github:repomix git dependency because its
          # min-release-age config conflicts with the --before it uses internally.
          # Downgrade to npm 11.4.0, which predates the flag (matches Dockerfile).
          npm install -g npm@11.4.0
          npm ci
          npm link repomix
      - name: Test website server
        working-directory: website/server
        run: node --run test

  bundle-website-server:
    name: Bundle Website Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
      - name: Build and link local repomix
        run: |
          npm ci
          node --run build
          npm link
      - name: Install website server dependencies
        working-directory: website/server
        run: |
          # npm 12 fails to prepare the github:repomix git dependency because its
          # min-release-age config conflicts with the --before it uses internally.
          # Downgrade to npm 11.4.0, which predates the flag (matches Dockerfile).
          npm install -g npm@11.4.0
          npm ci
          npm link repomix
      - name: Bundle website server
        working-directory: website/server
        run: node --run bundle
