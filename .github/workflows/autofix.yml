name: autofix.ci

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .tool-versions
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run biome with auto-fix
        run: pnpm run lint-biome
        continue-on-error: true

      - name: Run oxlint with auto-fix
        run: pnpm run lint-oxlint
        continue-on-error: true

      - name: Fix website client linting
        run: pnpm --filter repomix-website-client run lint
        continue-on-error: true

      - name: Fix website server linting
        run: pnpm --filter repomix-website-server run lint
        continue-on-error: true

      - name: Fix browser extension linting
        working-directory: browser
        run: pnpm run lint
        continue-on-error: true

      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8 # v1.3.3
