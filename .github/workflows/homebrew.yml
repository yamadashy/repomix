name: Homebrew

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@521d40582eb7b2dc6c83001c590c455100248f27 # main
        with:
          test-bot: false

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@521d40582eb7b2dc6c83001c590c455100248f27 # main

      - name: Bump packages
        uses: Homebrew/actions/bump-packages@521d40582eb7b2dc6c83001c590c455100248f27 # main
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          formulae: repomix
