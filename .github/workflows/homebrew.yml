name: Homebrew

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@841d750a0ed9262d3c3ca31f2173974696bc261a # main
        with:
          test-bot: false

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@841d750a0ed9262d3c3ca31f2173974696bc261a # main

      - name: Bump packages
        uses: Homebrew/actions/bump-packages@841d750a0ed9262d3c3ca31f2173974696bc261a # main
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          formulae: repomix
