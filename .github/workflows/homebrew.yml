name: Homebrew

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@fb0fe15d936a80ac0ba4c6cee691bc3da3f00f4e # main
        with:
          test-bot: false

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@fb0fe15d936a80ac0ba4c6cee691bc3da3f00f4e # main

      - name: Bump packages
        uses: Homebrew/actions/bump-packages@fb0fe15d936a80ac0ba4c6cee691bc3da3f00f4e # main
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          formulae: repomix
