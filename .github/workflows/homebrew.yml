name: Homebrew

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@6315ef70a8bfcd2c71104383846591ac113ace33 # main
        with:
          test-bot: false

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@6315ef70a8bfcd2c71104383846591ac113ace33 # main

      - name: Bump packages
        uses: Homebrew/actions/bump-packages@6315ef70a8bfcd2c71104383846591ac113ace33 # main
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          formulae: repomix
