name: Homebrew

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@51347a66bfd5b30903757d0b64ba2ca462e9ab38 # main
        with:
          test-bot: false

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@51347a66bfd5b30903757d0b64ba2ca462e9ab38 # main

      - name: Bump packages
        uses: Homebrew/actions/bump-packages@51347a66bfd5b30903757d0b64ba2ca462e9ab38 # main
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          formulae: repomix
