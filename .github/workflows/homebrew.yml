name: Homebrew

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3 # main
        with:
          test-bot: false

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3 # main

      - name: Bump packages
        uses: Homebrew/actions/bump-packages@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3 # main
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          formulae: repomix
