name: Homebrew

on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  homebrew:
    runs-on: macos-latest
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@caddd704cd8c1cbb45f9f3dfbd1f77d1f81e97f0 # main
        with:
          test-bot: false

      - name: Configure Git user
        uses: Homebrew/actions/git-user-config@caddd704cd8c1cbb45f9f3dfbd1f77d1f81e97f0 # main

      - name: Bump packages
        uses: Homebrew/actions/bump-packages@caddd704cd8c1cbb45f9f3dfbd1f77d1f81e97f0 # main
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          formulae: repomix
