# Run website in development mode
# $ docker compose -f website/compose.yml up --build

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ..:/workspace
    working_dir: /workspace/website/client
    environment:
      - NODE_ENV=development
    command: sh -c "pnpm install && pnpm run docs:dev -- --port 5173 --host"

  server:
    build:
      context: ..
      dockerfile: website/client/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
    working_dir: /workspace
    environment:
      - NODE_ENV=development
      - PORT=8080
      # Unset bundled mode for local development (volume mount overwrites bundled files)
      - REPOMIX_WORKER_PATH=
      - REPOMIX_WASM_DIR=
    command: sh -c "pnpm install && pnpm run build && cd website/server && pnpm run dev"
    develop:
      watch:
        - action: sync+restart
          path: ./server
          target: /workspace/website/server
