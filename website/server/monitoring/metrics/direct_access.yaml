description: |
  Count of requests that bypassed Cloudflare (no `cf-ray` header present).
  Under normal operation this should be ~0 — any non-zero rate means an
  attacker has discovered the Cloud Run origin URL and is hitting it directly,
  OR the Cloudflare Transform Rule that injects `x-origin-secret` is broken.
  Alert on any non-zero 5m rate.
filter: |
  resource.type="cloud_run_revision"
  resource.labels.service_name="repomix-server-us"
  jsonPayload.source="direct"
