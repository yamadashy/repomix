description: |
  Counter of pack requests keyed by terminal outcome. Sourced from the unified
  `event=pack_completed` log entry emitted by packAction and rateLimitMiddleware.
  Use for QPS, outcome breakdown, cache hit rate, and source (cloudflare vs direct).
filter: |
  resource.type="cloud_run_revision"
  resource.labels.service_name="repomix-server-us"
  jsonPayload.event="pack_completed"
labelExtractors:
  outcome: EXTRACT(jsonPayload.outcome)
  source: EXTRACT(jsonPayload.source)
  input_type: EXTRACT(jsonPayload.inputType)
  cached: EXTRACT(jsonPayload.cached)
  format: EXTRACT(jsonPayload.format)
metricDescriptor:
  metricKind: DELTA
  valueType: INT64
  unit: "1"
  labels:
    - key: outcome
      valueType: STRING
      description: success | validation_error | pack_error | rate_limited
    - key: source
      valueType: STRING
      description: cloudflare | direct (cf-ray presence)
    - key: input_type
      valueType: STRING
      description: file | url
    - key: cached
      valueType: STRING
      description: "true | false (cache hit for remote repo)"
    - key: format
      valueType: STRING
      description: xml | markdown | plain
